name: E2E (Cucumber + Appium Android)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + UiAutomator2
        run: |
          npm i -g appium
          appium driver install uiautomator2
          appium --version
          appium driver list --installed

      - name: Run emulator + tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 4096
          disable-animations: true
          script: |
            adb wait-for-device
            adb devices
            appium --address 127.0.0.1 --port 4723 --log-level info &
            sleep 15
            mvn clean test

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report.html

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
